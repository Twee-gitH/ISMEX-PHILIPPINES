<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0e1117; }
        .mask-container {
            position: absolute;
            top: -55px; /* Hides the top face/icon */
            left: 0;
            width: 100%;
            height: calc(100% + 105px); /* Hides the bottom 'Manage app' button */
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="mask-container">
        <iframe id="main-app" src=""></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');
        
        // ADD YOUR REAL STREAMLIT URL HERE
        let targetURL = "https://change.streamlit.app/?embed=true&embed_options=dark_theme";
        
        if (ref) { targetURL += "&ref=" + encodeURIComponent(ref); }
        document.getElementById('main-app').src = targetURL;
    </script>
</body>
</html>
